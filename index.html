 #splash-screen {
    position: fixed;

/* Animasi Loading Bar Tipis */
.loading-bar {
    width: 100px;
    height: 2px;
    background: #333;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
}

.loading-bar::after {
    content: '';
    position: absolute;
    left: -100%;
    width: 100%;
    height: 100%;
    background: #B4FF39;
    animation: loading 2s infinite;
}

@keyframes loading {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* Kelas buat ngilangin splash */
.fade-out {
    opacity: 0;
    visibility: hidden;
}

/* Style Kompas Clean */
.compass-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 30px auto;
    border-radius: 50%;
    border: 2px solid rgba(180, 255, 57, 0.2);
    background: rgba(255, 255, 255, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
}

.compass-ring {
    width: 100%;
    height: 100%;
    position: absolute;
    border-radius: 50%;
    transition: transform 0.1s linear;
}

.compass-ring::before {
    content: 'N';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 900;
    color: #ff4757;
}

.kaaba-pointer {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 90px;
    background: #B4FF39;
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);
    border-radius: 50px 50px 0 0;
    box-shadow: 0 0 20px rgba(180, 255, 57, 0.6);
    z-index: 10;
}

.kaaba-pointer::after {
    content: 'KIBLAT';
    position: absolute;
    top: -35px; /* Jarak pas di atas ujung jarum */
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.5rem;

    <script>
        let baseDate = new Date();
let selectedDate = new Date();
let daftarLibur = {}; // Tempat nampung data dari API/Cache

async function fetchLibur(tahun) {
    // 1. Data Cadangan (Hardcoded) buat 2026 biar PASTI MERAH
    const backupLibur2026 = {
        "2026-01-01": "Tahun Baru 2026 Masehi",
        "2026-02-17": "Isra Mikraj Nabi Muhammad SAW",
        "2026-03-20": "Hari Suci Nyepi (Tahun Baru Saka 1948)",
        "2026-03-20": "Idul Fitri 1447 Hijriah",
        "2026-03-21": "Idul Fitri 1447 Hijriah",
        "2026-04-03": "Wafat Yesus Kristus",
        "2026-05-01": "Hari Buruh Internasional",
        "2026-05-14": "Kenaikan Yesus Kristus", // INI YANG LO CARI
        "2026-05-27": "Hari Raya Idul Adha",
        "2026-06-01": "Hari Lahir Pancasila",
        "2026-08-17": "Hari Kemerdekaan RI",
        "2026-12-25": "Hari Raya Natal"
    };

    try {
        const response = await fetch(`https://dayoffapi.vercel.app/api?year=${tahun}`);
        if (!response.ok) throw new Error('API Down');
        
        const data = await response.json();
        let tempLibur = {};
        data.forEach(item => {
            const cleanDate = item.tanggal.split('T')[0]; 
            tempLibur[cleanDate] = item.keterangan;
        });
        daftarLibur = tempLibur;
    } catch (err) {
        console.log("Pake data cadangan karena API error");
        // Kalau gagal/offline, pake data backup (khusus 2026)
        daftarLibur = (tahun == 2026) ? backupLibur2026 : {};
    }
    
    updateUI(selectedDate);
}
// Panggil fungsi ini supaya mesinnya jalan pas aplikasi dibuka
fetchLibur(new Date().getFullYear());



        // 1. MESIN HITUNG JAWA LENGKAP (PENGGANTI getPasaranJawa)
        function getDataJawaLengkap(target) {
            const pasaranArr = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
            const nHari = [5, 4, 3, 7, 8, 6, 9]; // Nilai hari (Minggu-Sabtu)
            const nPasaran = [5, 9, 7, 4, 8];    // Nilai pasaran (Legi-Kliwon)
            const daftarWuku = [
                "Sinta", "Landep", "Wukir", "Kurantil", "Tolu", "Gumbreg", "Warigalit", "Warigagung",
                "Juliwangi", "Sungsang", "Galungan", "Kuningan", "Langkir", "Mandihiya", "Prangbakat",
                "Bala", "Wugu", "Wayang", "Kulawu", "Dukut", "Watugunung"
            ];
            const daftarWarsa = ["Alip", "Ehe", "Jimawal", "Je", "Dal", "Be", "Wawu", "Jimakir"];

            const refDate = new Date(1900, 0, 1);
            const diffDays = Math.floor((target - refDate) / (1000 * 60 * 60 * 24));
            
            // Pasaran & Neptu
            const pIdx = (diffDays + 1) % 5;
            const pFinal = pasaranArr[pIdx < 0 ? pIdx + 5 : pIdx];
            const neptuTotal = nHari[target.getDay()] + nPasaran[pIdx < 0 ? pIdx + 5 : pIdx];
            
            // Wuku (Siklus 210 hari)
            const refWuku = new Date(2023, 0, 1); 
            const diffWuku = Math.floor((target - refWuku) / (1000 * 60 * 60 * 24));
            const wukuIdx = Math.floor(diffWuku / 7) % 30;
            const wukuFinal = daftarWuku[wukuIdx < 0 ? wukuIdx + 30 : (wukuIdx >= 30 ? wukuIdx % 30 : wukuIdx)] || "Sinta";

                        // Warsa (Tahun Jawa) - Di-offset ke 2026 agar muncul "Ehe"
            const warsaIdx = (target.getFullYear() - 2026 + 1) % 8;
            const warsaFinal = daftarWarsa[warsaIdx < 0 ? warsaIdx + 8 : warsaIdx];


            return { pasaran: pFinal, neptu: neptuTotal, wuku: wukuFinal, warsa: warsaFinal };
        }

        // 2. NAVIGASI HALAMAN
        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(bn => bn.classList.remove('active'));
            
            if(p === 'calendar') {
                document.getElementById('calendar-page').classList.add('active');
                document.getElementById('btn-cal').classList.add('active');
            } else if(p === 'kiblat') {
                document.getElementById('kiblat-page').classList.add('active');
                document.getElementById('btn-kiblat').classList.add('active');
                initCompass();
            } else {
                document.getElementById('prayer-page').classList.add('active');
                document.getElementById('btn-prayer').classList.add('active');
                updatePrayerTimes();
            }
        }
                // --- MESIN KOMPAS & KIBLAT ---
        function initCompass() {
            const ring = document.getElementById('compass-ring');
            const degreeTxt = document.getElementById('qibla-degree');
            const status = document.getElementById('kiblat-status');

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    // Ambil arah utara (heading)
                    let heading = e.webkitCompassHeading || (360 - e.alpha);
                    
                    if (heading) {
                        // Putar piringan derajatnya
                        ring.style.transform = `rotate(${-heading}deg)`;
                        // Update angka di layar
                        degreeTxt.innerText = `${Math.round(heading)}°`;
                        status.innerText = "Sensor Kompas Aktif";
                    }
                }, true);
            } else {
                status.innerText = "Sensor tidak didukung";
            }
        }


        // 3. KONVERSI HIJRIAH
        function gToH(d, m, y) {
            if (m < 3) { y -= 1; m += 12; }
            let a = Math.floor(y / 100);
            let b = 2 - a + Math.floor(a / 4);
            let jd = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + b - 1524;
            let l = jd - 1948440 + 10632;
            let n = Math.floor((l - 1) / 10631);
            l = l - 10631 * n + 354;
            let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
            l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
            let month = Math.floor((24 * l) / 709);
            let day = l - Math.floor((709 * month) / 24);
            let year = 30 * n + j - 30;
            return { d: day, m: month, y: year };
        }

        // 4. UPDATE TAMPILAN (UI)
        function updateUI(target) {
    const bln = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const hr = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const blnH = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Sya'ban", "Ramadhan", "Syawal", "Dzulqo'dah", "Dzulhijjah"];
    
    const yKey = target.getFullYear();
    const mKey = String(target.getMonth() + 1).padStart(2, '0');
    const dKey = String(target.getDate()).padStart(2, '0');
    const key = `${yKey}-${mKey}-${dKey}`; 
    
    const holidayName = daftarLibur[key];

    const elJam = document.getElementById('digital-clock');
    if(elJam) elJam.innerText = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    
    document.getElementById('txt-kotak-atas').innerText = `${bln[target.getMonth()]} ${target.getDate()}`;
    
    const elHoliday = document.getElementById('holiday-text');
    const elDayName = document.getElementById('txt-hari-besar');
    
    if (holidayName) {
        elHoliday.innerText = holidayName;
        elHoliday.style.display = 'block';
        elDayName.style.color = '#FF4444'; 
    } else {
        elHoliday.style.display = 'none';
        elDayName.style.color = (target.getDay() === 0) ? '#FF4444' : 'white'; 
    }
    elDayName.innerText = hr[target.getDay()];
    
    const dj = getDataJawaLengkap(target);
    document.getElementById('txt-jawa-val').innerText = dj.pasaran;
    document.getElementById('txt-wuku').innerText = `Wuku: ${dj.wuku}`;
    document.getElementById('txt-warsa').innerText = `Warsa: ${dj.warsa}`;
    document.getElementById('txt-neptu').innerText = `Neptu: ${dj.neptu}`;

    const h = gToH(target.getDate(), target.getMonth() + 1, target.getFullYear());
    document.getElementById('txt-hijri-val').innerText = `Hijrah: ${h.d} ${blnH[h.m - 1]} ${h.y} H`;

    const nC = document.getElementById('wheel-names');
    const uC = document.getElementById('wheel-nums'); // FIX DISINI (wheel-nums)
    
    if(nC && uC) {
        nC.innerHTML = ''; uC.innerHTML = '';
        for (let i = -3; i <= 3; i++) {
            let d = new Date(baseDate); 
            d.setDate(baseDate.getDate() + i);
            
            const wheelKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

            let sn = document.createElement('span'); 
            sn.className = 'label-day'; 
            sn.innerText = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"][d.getDay()];
            
            let su = document.createElement('span'); 
            su.className = 'num-day'; 
            su.innerText = d.getDate();
            
            if (d.getDay() === 0 || (daftarLibur && daftarLibur[wheelKey])) {
                su.style.color = '#FF4444';
            }

            if(d.toDateString() === target.toDateString()) su.classList.add('active');
            
            su.onclick = () => { 
                selectedDate = new Date(d); 
                updateUI(selectedDate); 
            };
            nC.appendChild(sn); 
            uC.appendChild(su);
        }
    }
}

async function updatePrayerTimes() {
    const defaultLat = -7.7067; 
    const defaultLon = 114.0051;
    const now = new Date();
    const month = now.getMonth() + 1;
    const year = now.getFullYear();
    const todayStr = `${String(now.getDate()).padStart(2, '0')}-${String(month).padStart(2, '0')}-${year}`;

    const fetchData = async (lat, lon, label) => {
        try {
            const res = await fetch(`https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=20&month=${month}&year=${year}`);
            const d = await res.json();
            
            localStorage.setItem('monthly_prayers', JSON.stringify(d.data));
            localStorage.setItem('prayer_label', label);
            localStorage.setItem('last_lat', lat);
            localStorage.setItem('last_lon', lon);
            
            displayTodayTime(d.data, todayStr, label);
        } catch (err) {
            loadOfflineData(todayStr);
        }
    };

    function loadOfflineData(dateStr) {
        const savedData = JSON.parse(localStorage.getItem('monthly_prayers'));
        const savedLabel = localStorage.getItem('prayer_label') || "Mode Offline";
        if (savedData) {
            displayTodayTime(savedData, dateStr, savedLabel + " (Offline)");
        } else {
            document.getElementById('location-text').innerText = "Butuh internet sekali untuk sinkron sebulan.";
        }
    }

    function displayTodayTime(monthlyData, dateStr, label) {
        const dayData = monthlyData.find(item => item.date.gregorian.date === dateStr);
        if (dayData) {
            const t = dayData.timings;
            document.getElementById('location-text').innerText = label;
            document.getElementById('fajr').innerText = t.Fajr.split(' ')[0];
            document.getElementById('dhuhr').innerText = t.Dhuhr.split(' ')[0];
            document.getElementById('asr').innerText = t.Asr.split(' ')[0];
            document.getElementById('maghrib').innerText = t.Maghrib.split(' ')[0];
            document.getElementById('isha').innerText = t.Isha.split(' ')[0];
        }
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (p) => {
                const currentLat = p.coords.latitude;
                const currentLon = p.coords.longitude;
                const savedData = JSON.parse(localStorage.getItem('monthly_prayers'));
                const savedLat = localStorage.getItem('last_lat');
                const savedLon = localStorage.getItem('last_lon');

                if (savedData && savedLat && savedLon) {
                    const firstDate = savedData[0].date.gregorian;
                    const isSameMonth = parseInt(firstDate.month.number) === month && parseInt(firstDate.year) === year;
                    const isNear = Math.abs(currentLat - parseFloat(savedLat)) < 0.1 && Math.abs(currentLon - parseFloat(savedLon)) < 0.1;

                    if (isSameMonth && isNear) {
                        displayTodayTime(savedData, todayStr, localStorage.getItem('prayer_label') || "Lokasi Aktif");
                        return; 
                    }
                }
                fetchData(currentLat, currentLon, "Lokasi Aktif");
            },
            () => fetchData(defaultLat, defaultLon, "Situbondo"),
            { timeout: 5000 }
        );
    } else {
        fetchData(defaultLat, defaultLon, "Situbondo");
    }
}

// Fungsi mengisi tanggal berdasarkan bulan
function syncDropdowns() {
    const month = parseInt(monthSel.value);
    const year = selectedDate.getFullYear();
    const lastDay = new Date(year, month + 1, 0).getDate();

    const currentVal = dateSel.value;
    dateSel.innerHTML = ''; 
    
    for (let i = 1; i <= lastDay; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i;
        dateSel.appendChild(opt);
    }
    
    if(currentVal && currentVal <= lastDay) {
        dateSel.value = currentVal;
    } else {
        dateSel.value = 1;
    }
}

// Fungsi saat user memilih bulan/tanggal
function applySelection() {
    const y = new Date().getFullYear();
    const m = parseInt(monthSel.value);
    const d = parseInt(dateSel.value) || 1;
    
    selectedDate = new Date(y, m, d);
    baseDate = new Date(selectedDate); // Biar barisan angka di bawah (wheel) ikut geser
    updateUI(selectedDate);
}

monthSel.addEventListener('change', () => {
